# Configuração do Ansible para o laboratório home-lab.
# Este arquivo é carregado automaticamente quando ansible-playbook é executado
# a partir do diretório /ansible ou qualquer subdiretório.
#
# Referência: https://docs.ansible.com/ansible/latest/reference_appendices/config.html

[defaults]
# Inventário padrão — pode ser sobrescrito com -i na linha de comando
inventory = inventory/hosts.yml

# Usuário SSH padrão (sobrescrito por ansible_user no group_vars/all.yml)
remote_user = labadmin

# Chave SSH padrão
private_key_file = ~/.ssh/lab_id_rsa

# Diretório de roles
roles_path = roles

# Não verificar SSH host keys em ambiente de laboratório.
# ATENÇÃO: habilite host_key_checking=True em ambientes de produção.
host_key_checking = False

# Número de hosts processados em paralelo
forks = 10

# Timeout de conexão SSH (segundos)
timeout = 30

# Formato de saída: yaml é mais legível que json para debugging
stdout_callback = yaml

# Mostrar diff de mudanças por padrão
diff = True

# Caminhos de callback plugins
callback_whitelist = profile_tasks, timer

# Não criar arquivos .retry (já no .gitignore, mas evitamos criar desnecessariamente)
retry_files_enabled = False

# Coletar facts de forma mais rápida usando smart (só se não foram coletados recentemente)
gathering = smart
fact_caching = memory

# Desabilitar aviso de interpretação de hosts como Python (não aplicável ao lab)
interpreter_python = auto_silent

[privilege_escalation]
# Escalar privilégios com sudo por padrão (labadmin tem NOPASSWD configurado)
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
# Multiplex SSH para acelerar conexões repetidas ao mesmo host
ssh_args = -C -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
pipelining = True
control_path_dir = /tmp/ansible-ssh

[inventory]
# Ignorar erros de parsing de inventário para hosts que não existem ainda
# (útil durante o provisionamento quando as VMs ainda estão sendo criadas)
unparsed_is_failed = False

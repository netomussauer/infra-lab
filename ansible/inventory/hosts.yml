# Inventário estático do cluster K3s do laboratório home-lab.
#
# Grupos:
#   k3s_server  — nó control-plane (única VM com a API do K3s)
#   k3s_agents  — todos os nós worker (VMs + bare metal)
#   k3s_cluster — grupo de conveniência que agrega server + agents
#
# Nós bare metal (notebook-i5, raspberry-pi) não são gerenciados pelo Terraform,
# mas participam do cluster como workers via Ansible.

all:
  children:

    # -------------------------------------------------------------------------
    # Control-plane do K3s
    # -------------------------------------------------------------------------
    k3s_server:
      hosts:
        k3s-server:
          ansible_host: 192.168.1.30

    # -------------------------------------------------------------------------
    # Workers do K3s
    # -------------------------------------------------------------------------
    k3s_agents:
      hosts:
        k3s-worker-cicd:
          ansible_host: 192.168.1.31

        ci-runner:
          ansible_host: 192.168.1.32

        # Bare metal — Ubuntu 22.04, receberá label workload=monitoring
        notebook-i5:
          ansible_host: 192.168.1.65

        # Bare metal — Raspbian 12, ARMv7. Requer binário k3s para arm
        raspberry-pi:
          ansible_host: 192.168.1.110
          k3s_node_arch: arm
          k3s_node_label: "workload=edge"

    # -------------------------------------------------------------------------
    # Grupo completo do cluster (server + agents)
    # -------------------------------------------------------------------------
    k3s_cluster:
      children:
        k3s_server:
        k3s_agents:

    # -------------------------------------------------------------------------
    # Hosts físicos do laboratório (para tasks de manutenção geral)
    # -------------------------------------------------------------------------
    lab_physical:
      hosts:
        notebook-i7:
          ansible_host: 192.168.1.20
          ansible_user: root
          # Host Proxmox — gerenciado diretamente como root
        notebook-i5:
          ansible_host: 192.168.1.65
        raspberry-pi:
          ansible_host: 192.168.1.110
          k3s_node_arch: arm

# apps/hello-lab/deployment.yaml
# Aplicação de exemplo para validar o pipeline CI/CD e o fluxo GitOps
#
# Esta aplicação é gerenciada pelo ArgoCD via app-of-apps.
# Qualquer push ao repositório Gitea acionará o Tekton Pipeline,
# que fará build, push ao Harbor e atualizará a tag neste arquivo.
#
# Dry-run antes de aplicar:
#   kubectl apply --dry-run=client -f kubernetes/apps/hello-lab/deployment.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-lab
  namespace: default
  labels:
    app.kubernetes.io/name: "hello-lab"
    app.kubernetes.io/version: "v1"
    app.kubernetes.io/component: "api"
    app.kubernetes.io/managed-by: "argocd"
    environment: "lab"
    lab_id: "lab-k8s-01"
    lab_owner: "jose.mussauer"
    app: "hello-lab"
    version: "v1"
  annotations:
    # ArgoCD irá atualizar esta annotation após cada sync
    argocd.argoproj.io/sync-wave: "0"
    # Tag da imagem atual — atualizada pelo pipeline Tekton
    deployment.kubernetes.io/image-tag: "latest"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: "hello-lab"
      environment: "lab"

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  template:
    metadata:
      labels:
        app.kubernetes.io/name: "hello-lab"
        app.kubernetes.io/version: "v1"
        app.kubernetes.io/component: "api"
        app.kubernetes.io/managed-by: "argocd"
        environment: "lab"
        lab_id: "lab-k8s-01"
        lab_owner: "jose.mussauer"
        app: "hello-lab"
        version: "v1"
      annotations:
        prometheus.io/scrape: "false"
    spec:
      # Distribuir os pods entre os dois nodes disponíveis para workloads
      # Evitar que ambos os pods vão para o mesmo node
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: "hello-lab"

      # Rodar nos nodes com workload=cicd ou workload=monitoring
      # NodeAffinity permite ambos os nodes como destino
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: workload
                    operator: In
                    values:
                      - cicd
                      - monitoring

      # Sem tolerations para control-plane (tainted NoSchedule)
      tolerations: []

      # SecurityContext no nível do Pod
      securityContext:
        runAsNonRoot: true
        runAsUser: 101       # nginx user no alpine
        runAsGroup: 101
        fsGroup: 101

      containers:
        - name: hello-lab
          # Imagem padrão: nginx:alpine
          # Após pipeline: harbor.lab.local/lab/hello-lab:<tag>
          image: "nginx:alpine"
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 80
              protocol: TCP

          # SecurityContext no nível do container
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # nginx precisa escrever em /tmp e /var/run
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE   # necessário para bind na porta 80 com usuário não-root

          # Perfil: Sidecar / auxiliar (nginx simples)
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"

          # Readiness Probe — nginx responde na raiz
          readinessProbe:
            httpGet:
              path: "/"
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 3

          # Liveness Probe — verificar se o processo nginx está vivo
          # initialDelaySeconds maior que readiness para evitar restart prematuro
          livenessProbe:
            httpGet:
              path: "/"
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 3

          # Configuração do nginx via ConfigMap
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-pid
              mountPath: /var/run

          env:
            - name: APP_NAME
              value: "hello-lab"
            - name: APP_VERSION
              value: "v1"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

      volumes:
        - name: nginx-config
          configMap:
            name: hello-lab-nginx-config
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-pid
          emptyDir: {}

      # Terminar graciosamente em 30s
      terminationGracePeriodSeconds: 30

---
# ConfigMap com configuração customizada do nginx
# Exibe informações do pod para validar balanceamento de carga
apiVersion: v1
kind: ConfigMap
metadata:
  name: hello-lab-nginx-config
  namespace: default
  labels:
    app.kubernetes.io/name: "hello-lab"
    app.kubernetes.io/component: "config"
    app.kubernetes.io/managed-by: "argocd"
    environment: "lab"
    lab_id: "lab-k8s-01"
    lab_owner: "jose.mussauer"
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        # Página principal — responde com informações do pod
        location / {
            default_type text/html;
            return 200 '<!DOCTYPE html>
    <html>
    <head>
      <title>Hello Lab</title>
      <style>
        body { font-family: monospace; background: #1a1a2e; color: #e0e0e0; padding: 40px; }
        h1 { color: #4ecca3; }
        .info { background: #16213e; padding: 20px; border-radius: 8px; margin: 10px 0; }
        .label { color: #a0a0c0; font-size: 0.9em; }
        .value { color: #4ecca3; font-size: 1.1em; font-weight: bold; }
      </style>
    </head>
    <body>
      <h1>Hello from Lab K3s!</h1>
      <div class="info">
        <p><span class="label">App:</span> <span class="value">$hostname</span></p>
        <p><span class="label">Cluster:</span> <span class="value">lab-k8s-01</span></p>
        <p><span class="label">Environment:</span> <span class="value">lab</span></p>
      </div>
    </body>
    </html>';
        }

        # Health check endpoint — usado pelo readiness e liveness probe
        location /healthz {
            access_log off;
            default_type text/plain;
            return 200 'ok';
        }

        # Endpoint de métricas básico
        location /nginx-status {
            stub_status on;
            access_log off;
            allow 10.0.0.0/8;
            allow 192.168.0.0/16;
            deny all;
        }
    }

---
# PodDisruptionBudget — garante disponibilidade durante manutenções
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: hello-lab-pdb
  namespace: default
  labels:
    app.kubernetes.io/name: "hello-lab"
    app.kubernetes.io/component: "pdb"
    app.kubernetes.io/managed-by: "argocd"
    environment: "lab"
    lab_id: "lab-k8s-01"
    lab_owner: "jose.mussauer"
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: "hello-lab"

# cicd/gitea/helm-values.yaml
# Helm values para gitea/gitea chart
#
# Repositório: https://dl.gitea.com/charts/
# Chart: gitea-charts/gitea
#
# Instalar:
#   helm repo add gitea-charts https://dl.gitea.com/charts/
#   helm upgrade --install gitea gitea-charts/gitea \
#     -f kubernetes/cicd/gitea/helm-values.yaml \
#     --namespace cicd --create-namespace
#
# IP MetalLB alocado: 192.168.1.201
# Acesso: http://192.168.1.201 ou http://gitea.lab.local (com DNS/hosts configurado)

# Número de réplicas — 1 para SQLite (sem suporte a multi-replica com SQLite)
replicaCount: 1

image:
  registry: ""
  repository: gitea/gitea
  tag: "1.25.5"
  pullPolicy: IfNotPresent
  rootless: false

# Garantir que rode no node correto
nodeSelector:
  workload: "cicd"

# Toleration apenas para casos de manutenção; não roda no control-plane
tolerations: []

affinity: {}

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

# Service: LoadBalancer para expor via MetalLB
service:
  http:
    type: LoadBalancer
    port: 3000
    loadBalancerIP: "192.168.1.201"
    annotations:
      metallb.universe.tf/address-pool: "lab-pool"
  ssh:
    type: NodePort
    port: 22
    nodePort: 30022

# Persistência via local-path (NFS com root_squash não suporta chown de init containers)
persistence:
  enabled: true
  storageClass: "local-path"
  size: "20Gi"
  accessModes:
    - ReadWriteOnce
  claimName: "gitea-data"

# Configuração do Gitea
gitea:
  admin:
    username: "labadmin"
    # Alterar senha após primeiro login!
    # Gerada via: kubectl create secret generic gitea-admin-secret --from-literal=password=<senha>
    password: "labadmin123!"
    email: "jose.mussauer@stone.com.br"

  config:
    server:
      DOMAIN: "gitea.lab.local"
      ROOT_URL: "http://gitea.lab.local"
      HTTP_PORT: 3000
      SSH_DOMAIN: "gitea.lab.local"
      SSH_PORT: 22
      DISABLE_SSH: false
      LFS_START_SERVER: true

    database:
      DB_TYPE: "postgres"
      HOST: "gitea-postgresql:5432"
      NAME: "gitea"
      USER: "gitea"
      PASSWD: "gitea123"

    repository:
      DEFAULT_PRIVATE: false
      DEFAULT_PUSH_CREATE_PRIVATE: false
      ENABLE_PUSH_CREATE_USER: true
      ENABLE_PUSH_CREATE_ORG: true

    service:
      DISABLE_REGISTRATION: false
      REQUIRE_SIGNIN_VIEW: false
      ALLOW_ONLY_INTERNAL_REGISTRATION: false

    cache:
      ADAPTER: "memory"

    session:
      PROVIDER: "file"

    log:
      LEVEL: "Info"
      MODE: "console"

    metrics:
      ENABLED: true
      TOKEN: ""

  # Probes de saúde
  livenessProbe:
    enabled: true
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 60
    periodSeconds: 15
    failureThreshold: 5
    successThreshold: 1

  readinessProbe:
    enabled: true
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 20
    periodSeconds: 10
    failureThreshold: 3
    successThreshold: 1

  startupProbe:
    enabled: true
    httpGet:
      path: /
      port: http
    failureThreshold: 30
    periodSeconds: 10

# PostgreSQL bundled — suportado nativamente pelo chart v12
postgresql:
  enabled: true
  global:
    postgresql:
      auth:
        username: "gitea"
        password: "gitea123"
        database: "gitea"
  primary:
    persistence:
      enabled: true
      storageClass: "local-path"
      size: "5Gi"
    nodeSelector:
      workload: "cicd"

postgresql-ha:
  enabled: false

mysql:
  enabled: false

# Desabilitar cache distribuído (usando memória e file session)
redis-cluster:
  enabled: false

redis:
  enabled: false

valkey-cluster:
  enabled: false

valkey:
  enabled: false

# Init containers para setup
initPreScript: ""

# Métricas para Prometheus
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "3000"
  prometheus.io/path: "/metrics"

podLabels:
  app.kubernetes.io/name: "gitea"
  app.kubernetes.io/version: "1.25.5"
  app.kubernetes.io/component: "git-server"
  app.kubernetes.io/managed-by: "helm"
  environment: "lab"
  lab_id: "lab-k8s-01"
  lab_owner: "jose.mussauer"

# podSecurityContext: fsGroup garante que o volume seja acessível ao UID 1000.
# containerSecurityContext vazio: init containers rodam como root (necessário para chown),
# o main container usa o USER da imagem (git, UID 1000).
podSecurityContext:
  fsGroup: 1000

containerSecurityContext: {}
